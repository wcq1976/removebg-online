<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一键抠图 - 免费在线AI图片背景移除</title>
<meta name="description" content="免费在线移除图片背景，AI智能抠图，3秒出结果，无需注册，隐私安全">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f4ff;
  --white: #ffffff;
  --primary: #6c5ce7;
  --primary-light: #a29bfe;
  --primary-dark: #4834d4;
  --text: #2d3436;
  --muted: #636e72;
  --border: #dfe6e9;
  --success: #00b894;
  --danger: #e17055;
  --shadow: 0 8px 32px rgba(108,92,231,0.12);
  --r: 16px;
  --font: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem 4rem;
}

/* Header */
header {
  text-align: center;
  margin-bottom: 2.5rem;
}
.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--white);
  padding: 10px 20px;
  border-radius: 999px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  margin-bottom: 1rem;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 16px;
}
.logo-text {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
header p {
  color: var(--muted);
  font-size: 0.95rem;
  margin-top: 0.25rem;
}

/* Card */
.card {
  background: var(--white);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 520px;
  overflow: hidden;
}

/* Upload zone */
.upload-zone {
  padding: 2.5rem 2rem;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
}
.upload-zone:hover { background: #fafbff; }
.upload-zone input[type="file"] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
}
.upload-inner {
  border: 2.5px dashed #c8d3fe;
  border-radius: 12px;
  padding: 2.5rem 1rem;
  text-align: center;
  transition: border-color 0.2s;
  pointer-events: none;
}
.upload-zone:hover .upload-inner,
.upload-zone.dragover .upload-inner { border-color: var(--primary); }
.upload-zone.dragover { background: #f5f3ff; }
.upload-illus {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #f0eeff, #e8e4ff);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin: 0 auto 1rem;
}
.upload-inner h3 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.4rem;
}
.upload-inner p {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.6;
}
.upload-btn {
  display: inline-block;
  margin-top: 1rem;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 0.6rem 1.5rem;
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: 600;
  pointer-events: none;
}
.formats {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
  margin-top: 0.8rem;
}
.fmt {
  background: #f1f3fe;
  color: var(--primary);
  font-size: 0.7rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  pointer-events: none;
}

/* Preview */
.preview-wrap {
  display: none;
  padding: 1.5rem 2rem 0;
}
.preview-img-box {
  border-radius: 12px;
  overflow: hidden;
  border: 1.5px solid var(--border);
  background: #f8f9fa;
  position: relative;
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
}
.preview-img-box img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; display: block;
}
.change-btn {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.5);
  color: white; font-size: 0.72rem;
  padding: 3px 10px; border-radius: 999px;
  backdrop-filter: blur(8px);
  cursor: pointer; border: none; font-family: var(--font);
}
.change-btn:hover { background: rgba(0,0,0,0.7); }

/* Actions */
.actions {
  display: none;
  padding: 1.25rem 2rem;
  gap: 12px; flex-direction: column;
}
.btn-main {
  width: 100%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white; border: none;
  padding: 0.9rem;
  border-radius: 12px;
  font-family: var(--font);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  box-shadow: 0 4px 16px rgba(108,92,231,0.3);
}
.btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-reset {
  width: 100%;
  background: none; color: var(--muted);
  border: 1.5px solid var(--border);
  padding: 0.7rem;
  border-radius: 12px;
  font-family: var(--font);
  font-size: 0.9rem;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.btn-reset:hover { color: var(--text); border-color: var(--text); }

/* Processing */
.processing-wrap {
  display: none;
  padding: 2.5rem 2rem;
  text-align: center;
}
.spinner-ring {
  width: 52px; height: 52px;
  border: 4px solid #e8e4ff;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin: 0 auto 1.25rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.processing-wrap h3 {
  font-size: 1rem; font-weight: 600;
  color: var(--text); margin-bottom: 0.4rem;
}
.processing-wrap p {
  font-size: 0.82rem; color: var(--muted); margin-bottom: 1.25rem;
}
.prog-bar {
  height: 6px; background: #f0eeff;
  border-radius: 999px; overflow: hidden;
  max-width: 200px; margin: 0 auto;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 999px;
  transition: width 0.4s ease;
  width: 0%;
}
#progressMsg {
  font-size: 0.78rem;
  color: var(--primary);
  margin-top: 0.5rem;
  font-weight: 500;
}

/* Result */
.result-wrap {
  display: none;
  padding: 1.5rem 2rem;
}
.compare-label {
  display: flex; gap: 8px; margin-bottom: 8px;
  font-size: 0.78rem; color: var(--muted); font-weight: 500;
}
.compare-label span:last-child { color: var(--success); }
.compare-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 1.25rem;
}
.result-img-box {
  border-radius: 10px; overflow: hidden;
  border: 1.5px solid var(--border);
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
}
.result-img-box img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; display: block;
}
.result-img-box.transparent {
  background-image: repeating-conic-gradient(#e8e8ee 0% 25%, #f8f8fc 0% 50%);
  background-size: 14px 14px;
}
.btn-dl {
  width: 100%;
  background: linear-gradient(135deg, var(--success), #00a381);
  color: white; border: none;
  padding: 0.9rem;
  border-radius: 12px;
  font-family: var(--font);
  font-size: 1rem; font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,184,148,0.3);
  transition: opacity 0.2s, transform 0.15s;
  margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-dl:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-again {
  width: 100%;
  background: none; color: var(--muted);
  border: 1.5px solid var(--border);
  padding: 0.7rem;
  border-radius: 12px;
  font-family: var(--font); font-size: 0.9rem;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.btn-again:hover { color: var(--text); border-color: var(--text); }

/* Error */
.err-box {
  display: none;
  margin: 0 2rem 1.5rem;
  background: #fff5f5;
  border: 1.5px solid #fecaca;
  color: var(--danger);
  padding: 0.75rem 1rem;
  border-radius: 10px;
  font-size: 0.85rem;
  line-height: 1.5;
}

/* Notice - 纯前端无后端说明 */
.notice {
  margin-top: 1.25rem;
  background: #f0fdf4;
  border: 1.5px solid #bbf7d0;
  border-radius: 10px;
  padding: 0.75rem 1rem;
  font-size: 0.78rem;
  color: #166534;
  display: flex; gap: 8px; align-items: flex-start;
  line-height: 1.5;
}
.notice-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }

/* Divider */
.divider {
  height: 1px; background: var(--border);
  margin: 0 2rem;
}

/* Footer */
footer {
  margin-top: 2rem;
  color: var(--muted);
  font-size: 0.78rem;
  text-align: center;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✂</div>
    <span class="logo-text">一键抠图</span>
  </div>
  <p>上传图片，AI自动移除背景 · 完全免费</p>
</header>

<div class="card" id="card">

  <!-- 上传区 -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" accept="image/jpeg,image/png,image/webp" id="fileInput">
    <div class="upload-inner">
      <div class="upload-illus">🖼️</div>
      <h3>点击或拖拽上传图片</h3>
      <p>支持人像、宠物、商品、Logo 等各类图片<br>图片在本地处理，不上传服务器</p>
      <div class="upload-btn">选择图片</div>
      <div class="formats">
        <span class="fmt">JPG</span>
        <span class="fmt">PNG</span>
        <span class="fmt">WEBP</span>
        <span class="fmt">最大 25MB</span>
      </div>
    </div>
  </div>

  <!-- 预览 -->
  <div class="preview-wrap" id="previewWrap">
    <div class="preview-img-box">
      <img id="previewImg" src="" alt="预览">
      <button class="change-btn" onclick="resetAll()">重新选择</button>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="actions" id="actionsWrap">
    <button class="btn-main" id="startBtn" onclick="startProcess()">开始抠图</button>
    <button class="btn-reset" onclick="resetAll()">重新选择</button>
  </div>

  <!-- 处理中 -->
  <div class="processing-wrap" id="processingWrap">
    <div class="spinner-ring"></div>
    <h3>AI 正在处理中...</h3>
    <p>首次使用需加载模型（约10秒），请耐心等待</p>
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div id="progressMsg">初始化...</div>
  </div>

  <!-- 错误 -->
  <div class="err-box" id="errBox"></div>

  <div class="divider" id="divider" style="display:none;"></div>

  <!-- 结果 -->
  <div class="result-wrap" id="resultWrap">
    <div class="compare-label">
      <span>原图</span>
      <span>→</span>
      <span>✓ 已去除背景</span>
    </div>
    <div class="compare-grid">
      <div class="result-img-box">
        <img id="origResultImg" src="" alt="原图">
      </div>
      <div class="result-img-box transparent">
        <img id="resultImg" src="" alt="结果">
      </div>
    </div>
    <button class="btn-dl" id="downloadBtn">⬇ 下载 PNG（透明背景）</button>
    <button class="btn-again" onclick="resetAll()">↩ 处理另一张图片</button>
  </div>

  <!-- 安全说明 -->
  <div style="padding: 0 2rem 1.5rem;">
    <div class="notice">
      <span class="notice-icon">🔒</span>
      <span>你的图片<strong>完全在本地浏览器中处理</strong>，不会上传到任何服务器，100% 隐私安全。AI 模型通过 WebAssembly 在你的设备上运行。</span>
    </div>
  </div>
</div>

<footer>© 2026 一键抠图 | 免费在线工具 | 图片本地处理，保护隐私</footer>

<script type="module">
import { removeBackground } from 'https://esm.sh/@imgly/background-removal@1.4.5';

let currentFile = null;
let resultBlob = null;

const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');

// 文件选择
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

// 拖拽
uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('dragover');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  if (!file.type.startsWith('image/')) {
    showErr('请上传图片文件（JPG、PNG、WEBP）');
    return;
  }
  if (file.size > 25 * 1024 * 1024) {
    showErr('文件过大，请上传 25MB 以内的图片');
    return;
  }
  currentFile = file;
  hideErr();

  const url = URL.createObjectURL(file);
  document.getElementById('previewImg').src = url;
  document.getElementById('origResultImg').src = url;

  show('uploadZone', false);
  show('previewWrap', true);
  show('actionsWrap', true);
  show('processingWrap', false);
  show('resultWrap', false);
  show('divider', false);
}

window.startProcess = async function() {
  if (!currentFile) return;

  show('previewWrap', false);
  show('actionsWrap', false);
  show('processingWrap', true);
  hideErr();

  setProgress(5, '加载 AI 模型中...');

  try {
    const config = {
      debug: false,
      progress: (key, current, total) => {
        if (total > 0) {
          const pct = Math.round(5 + (current / total) * 75);
          const msgs = {
            'fetch:size': '下载模型...',
            'compute:inference': '分析图像边缘...',
          };
          setProgress(pct, msgs[key] || '处理中...');
        }
      }
    };

    setProgress(20, '首次使用加载模型，请稍等...');
    const blob = await removeBackground(currentFile, config);
    resultBlob = blob;
    setProgress(95, '即将完成...');

    const resultUrl = URL.createObjectURL(blob);
    document.getElementById('resultImg').src = resultUrl;

    document.getElementById('downloadBtn').onclick = () => {
      const a = document.createElement('a');
      a.href = resultUrl;
      const name = currentFile.name.replace(/\.[^.]+$/, '');
      a.download = name + '_nobg.png';
      a.click();
    };

    setProgress(100, '完成！');
    setTimeout(() => {
      show('processingWrap', false);
      show('resultWrap', true);
      show('divider', true);
    }, 300);

  } catch (err) {
    console.error(err);
    show('processingWrap', false);
    show('previewWrap', true);
    show('actionsWrap', true);
    showErr('处理失败，请尝试更换图片，或刷新页面重试。\n错误信息：' + err.message);
  }
};

window.resetAll = function() {
  currentFile = null;
  resultBlob = null;
  fileInput.value = '';
  document.getElementById('previewImg').src = '';
  document.getElementById('resultImg').src = '';
  document.getElementById('origResultImg').src = '';
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('progressMsg').textContent = '初始化...';

  show('uploadZone', true);
  show('previewWrap', false);
  show('actionsWrap', false);
  show('processingWrap', false);
  show('resultWrap', false);
  show('divider', false);
  hideErr();
};

function setProgress(pct, msg) {
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progressMsg').textContent = msg;
}

function show(id, visible) {
  const el = document.getElementById(id);
  if (id === 'previewWrap' || id === 'actionsWrap') {
    el.style.display = visible ? 'block' : 'none';
  } else if (id === 'actionsWrap') {
    el.style.display = visible ? 'flex' : 'none';
  } else {
    el.style.display = visible ? (id === 'resultWrap' ? 'block' : id === 'divider' ? 'block' : 'block') : 'none';
  }
  // Fix flex for actionsWrap
  if (id === 'actionsWrap') el.style.display = visible ? 'flex' : 'none';
}

function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideErr() {
  document.getElementById('errBox').style.display = 'none';
}
</script>

</body>
</html>
