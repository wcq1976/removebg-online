<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键抠图 - 免费在线图片背景移除</title>
    <meta name="description" content="免费在线移除图片背景，AI智能抠图，3秒出结果">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --surface: #ffffff;
            --surface-elevated: #f8fafc;
            --background: #f1f5f9;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', 'Space Grotesk', -apple-system, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animated background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(217, 70, 239, 0.1) 0%, transparent 50%),
                var(--background);
        }
        
        .bg-pattern::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 75% 75%, rgba(217, 70, 239, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        
        /* Header */
        header {
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .header-actions {
            display: flex;
            gap: 1rem;
        }
        
        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            font-family: inherit;
        }
        
        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
        }
        
        .btn-ghost:hover {
            background: var(--surface-elevated);
            color: var(--text);
        }
        
        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }
        
        /* Main content */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        
        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        
        .hero h1 span {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero p {
            font-size: 1.125rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Upload area */
        .upload-area {
            background: var(--surface);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 2px dashed var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .upload-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 
                0 20px 25px -5px rgba(0, 0, 0, 0.1),
                0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .upload-area:hover::before, .upload-area.dragover::before {
            opacity: 1;
        }
        
        .upload-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        
        .upload-area h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        
        .upload-area p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        .upload-area p span {
            color: var(--primary);
            font-weight: 600;
        }
        
        .upload-input {
            display: none;
        }
        
        /* Processing state */
        .processing {
            display: none;
            text-align: center;
            padding: 3rem;
        }
        
        .processing.active {
            display: block;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 1.5rem;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .processing h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        
        .processing p {
            color: var(--text-muted);
        }
        
        /* Result area */
        .result {
            display: none;
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .result.active {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        
        @media (max-width: 768px) {
            .result.active {
                grid-template-columns: 1fr;
            }
        }
        
        .result-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        .result-card h4 {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .result-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            border-radius: 12px;
            background: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        
        .result-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .result-actions .btn {
            flex: 1;
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        /* Compare slider */
        .compare-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .compare-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .compare-slider {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 4px;
            background: white;
            cursor: ew-resize;
            z-index: 10;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        
        .compare-slider::after {
            content: '⟷';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .compare-before, .compare-after {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .compare-before {
            clip-path: inset(0 50% 0 0);
        }
        
        /* Features */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 4rem;
        }
        
        @media (max-width: 768px) {
            .features {
                grid-template-columns: 1fr;
            }
        }
        
        .feature {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .feature:hover {
            transform: translateY(-4px);
        }
        
        .feature-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .feature h4 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .feature p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-overlay.active {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">✂️</div>
                <span>一键抠图</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-ghost">使用指南</button>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">开始使用</button>
            </div>
        </div>
    </header>
    
    <main>
        <div class="hero">
            <h1>AI智能<span>一键抠图</span></h1>
            <p>上传图片，AI自动识别主体，3秒移除背景。完全免费，无需注册！</p>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" class="upload-input" accept="image/*">
            <div class="upload-icon">☁️</div>
            <h3>拖拽图片到这里</h3>
            <p>或 <span>点击选择文件</span></p>
            <p style="margin-top: 0.5rem; color: #94a3b8;">支持 JPG、PNG、WebP，最大 10MB</p>
        </div>
        
        <div class="processing" id="processing">
            <div class="spinner"></div>
            <h3>AI正在智能抠图...</h3>
            <p>预计需要 3-5 秒，请稍候</p>
        </div>
        
        <div class="result" id="result">
            <div class="result-card">
                <h4>处理结果</h4>
                <div class="compare-container">
                    <img id="resultImage" class="result-image" src="" alt="Result">
                </div>
                <div class="result-actions">
                    <button class="btn btn-success" onclick="downloadResult()">⬇️ 下载结果</button>
                    <button class="btn btn-ghost" onclick="reset()">🔄 处理下一张</button>
                </div>
            </div>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <h4>3秒出结果</h4>
                <p>AI智能识别，快速精准</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <h4>精准抠图</h4>
                <p>发丝级细节，边缘清晰</p>
            </div>
            <div class="feature">
                <div class="feature-icon">�完全免费</div>
                <h4>永久免费</h4>
                <p>无需注册，立即使用</p>
            </div>
        </div>
    </main>
    
    <footer>
        <p>© 2026 一键抠图 | 免费在线图片背景移除工具</p>
    </footer>
    
    <div class="toast" id="toast"></div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const processing = document.getElementById('processing');
        const result = document.getElementById('result');
        const resultImage = document.getElementById('resultImage');
        const toast = document.getElementById('toast');
        
        let currentFile = null;
        
        // API 配置 - 使用免费API
        const API_URL = 'https://api.remove.bg/v1.0/removebg';
        const API_KEY = 'e1c7d8d6f5c4a3b2e1d0c9a8b7c6d5e4'; // 免费API key示例
        
        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('请上传图片文件');
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                showToast('图片大小不能超过 10MB');
                return;
            }
            
            currentFile = file;
            processImage(file);
        }
        
        async function processImage(file) {
            uploadArea.style.display = 'none';
            processing.classList.add('active');
            
            const formData = new FormData();
            formData.append('image_file', file);
            formData.append('size', 'auto');
            formData.append('format', 'png');
            
            try {
                // 使用免费API
                const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: {
                        'X-Api-Key': 'e1c7d8d6f5c4a3b2e1d0c9a8b7c6d5e4'
                    },
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error('处理失败');
                }
                
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                resultImage.src = url;
                processing.classList.remove('active');
                result.classList.add('active');
                showToast('处理完成！');
            } catch (error) {
                console.error(error);
                processing.classList.remove('active');
                uploadArea.style.display = 'block';
                showToast('处理失败，请重试');
            }
        }
        
        function downloadResult() {
            if (resultImage.src) {
                const link = document.createElement('a');
                link.href = resultImage.src;
                link.download = 'removed-bg-' + Date.now() + '.png';
                link.click();
                showToast('开始下载！');
            }
        }
        
        function reset() {
            result.classList.remove('active');
            uploadArea.style.display = 'block';
            resultImage.src = '';
            fileInput.value = '';
            currentFile = null;
        }
        
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
