<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键抠图 - 免费在线图片背景移除</title>
    <meta name="description" content="免费在线移除图片背景，AI智能抠图，3秒出结果">
    <meta name="theme-color" content="#6366f1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --surface: #ffffff;
            --surface-elevated: #f8fafc;
            --background: #f8fafc;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
            --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            font-size: 16px;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139, 92, 246, 0.1), transparent),
                var(--background);
        }
        
        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.25rem;
        }
        
        .header-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.125rem;
            color: var(--text);
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--gradient);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            box-shadow: var(--shadow-md);
        }
        
        .header-badge {
            font-size: 0.75rem;
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
            padding: 0.25rem 0.625rem;
            border-radius: 20px;
            font-weight: 600;
        }
        
        /* Main */
        .main {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1.25rem;
        }
        
        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .hero h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }
        
        .hero h1 span {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero p {
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }
        
        /* Upload Card */
        .upload-card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 2.5rem 1.5rem;
            box-shadow: var(--shadow-lg), 0 0 0 1px var(--border);
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .upload-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .upload-card:active {
            transform: scale(0.98);
        }
        
        .upload-card.has-file::before {
            opacity: 0.03;
        }
        
        .upload-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.25rem;
            background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: transform 0.3s;
        }
        
        .upload-card:hover .upload-icon {
            transform: translateY(-4px);
        }
        
        .upload-card h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.375rem;
        }
        
        .upload-card p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        .upload-card p span {
            color: var(--primary);
            font-weight: 500;
        }
        
        .upload-input {
            display: none;
        }
        
        .file-info {
            display: none;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: var(--surface-elevated);
            border-radius: var(--radius-md);
            margin-top: 1rem;
        }
        
        .file-info.show {
            display: flex;
        }
        
        .file-thumb {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--border);
        }
        
        .file-name {
            flex: 1;
            text-align: left;
            font-size: 0.875rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .file-remove {
            width: 28px;
            height: 28px;
            border: none;
            background: var(--error);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Process Button */
        .process-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-md), 0 0 20px rgba(99, 102, 241, 0.3);
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .process-btn:active {
            transform: scale(0.98);
        }
        
        .process-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 3rem 1.5rem;
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
        }
        
        .loading.show {
            display: block;
        }
        
        .loading-spinner {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.25rem;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading h3 {
            font-size: 1.125rem;
            margin-bottom: 0.375rem;
        }
        
        .loading p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        .loading-progress {
            width: 200px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 1.25rem auto 0;
            overflow: hidden;
        }
        
        .loading-progress-bar {
            height: 100%;
            background: var(--gradient);
            border-radius: 2px;
            animation: progress 2s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        /* Result */
        .result {
            display: none;
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        
        .result.show {
            display: block;
        }
        
        .result-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .result-header h3 {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .result-header h3::before {
            content: '✓';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background: var(--success);
            color: white;
            border-radius: 50%;
            font-size: 0.75rem;
        }
        
        .result-body {
            padding: 1rem;
            aspect-ratio: 1;
            background: 
                linear-gradient(45deg, #f1f5f9 25%, transparent 25%),
                linear-gradient(-45deg, #f1f5f9 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #f1f5f9 75%),
                linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .result-body img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
        }
        
        .result-actions {
            padding: 1rem 1.25rem;
            display: flex;
            gap: 0.75rem;
            border-top: 1px solid var(--border);
        }
        
        .result-btn {
            flex: 1;
            padding: 0.875rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .result-btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        
        .result-btn-primary:active {
            transform: scale(0.98);
        }
        
        .result-btn-secondary {
            background: var(--surface-elevated);
            color: var(--text-secondary);
        }
        
        .result-btn-secondary:active {
            background: var(--border);
        }
        
        /* Features */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-top: 2rem;
        }
        
        .feature {
            background: var(--surface);
            padding: 1.25rem 0.75rem;
            border-radius: var(--radius-lg);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        
        .feature-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .feature h4 {
            font-size: 0.8125rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .feature p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.8125rem;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 0.875rem 1.5rem;
            border-radius: var(--radius-md);
            font-size: 0.9375rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .toast.error {
            background: var(--error);
        }
        
        .toast.success {
            background: var(--success);
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">✂️</div>
                <span>一键抠图</span>
            </div>
            <span class="header-badge">完全免费</span>
        </div>
    </header>
    
    <main class="main">
        <section class="hero">
            <h1>AI智能<span>一键抠图</span></h1>
            <p>上传图片，AI自动识别主体，3秒移除背景</p>
        </section>
        
        <section class="upload-card" id="uploadCard">
            <input type="file" id="fileInput" class="upload-input" accept="image/*">
            <div class="upload-icon">📤</div>
            <h3>点击上传图片</h3>
            <p>或 <span>拖拽文件到这里</span></p>
            <p style="margin-top: 0.5rem; color: var(--text-muted); font-size: 0.8125rem;">支持 JPG、PNG、WebP</p>
            
            <div class="file-info" id="fileInfo">
                <img id="fileThumb" class="file-thumb" src="" alt="">
                <span class="file-name" id="fileName"></span>
                <button class="file-remove" id="fileRemove">×</button>
            </div>
            
            <button class="process-btn" id="processBtn" disabled>开始处理</button>
        </section>
        
        <section class="loading" id="loading">
            <div class="loading-spinner"></div>
            <h3>AI正在智能抠图</h3>
            <p>预计需要 3-5 秒</p>
            <div class="loading-progress">
                <div class="loading-progress-bar"></div>
            </div>
        </section>
        
        <section class="result" id="result">
            <div class="result-header">
                <h3>处理完成</h3>
            </div>
            <div class="result-body">
                <img id="resultImg" src="" alt="Result">
            </div>
            <div class="result-actions">
                <button class="result-btn result-btn-secondary" onclick="reset()">🔄 重新处理</button>
                <button class="result-btn result-btn-primary" onclick="download()">⬇️ 保存图片</button>
            </div>
        </section>
        
        <section class="features">
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <h4>3秒出结果</h4>
                <p>AI快速精准</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <h4>发丝级精度</h4>
                <p>边缘清晰</p>
            </div>
            <div class="feature">
                <div class="feature-icon">💯</div>
                <h4>完全免费</h4>
                <p>无需注册</p>
            </div>
        </section>
        
        <footer class="footer">
            <p>© 2026 一键抠图 | 免费在线图片背景移除</p>
        </footer>
    </main>
    
    <div class="toast" id="toast"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadCard = document.getElementById('uploadCard');
        const fileInfo = document.getElementById('fileInfo');
        const fileThumb = document.getElementById('fileThumb');
        const fileName = document.getElementById('fileName');
        const fileRemove = document.getElementById('fileRemove');
        const processBtn = document.getElementById('processBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const resultImg = document.getElementById('resultImg');
        const toast = document.getElementById('toast');
        
        let selectedFile = null;
        let resultUrl = '';
        
        // Upload
        uploadCard.addEventListener('click', (e) => {
            if (e.target !== fileRemove) {
                fileInput.click();
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });
        
        // Drag & drop
        uploadCard.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadCard.style.borderColor = 'var(--primary)';
        });
        
        uploadCard.addEventListener('dragleave', () => {
            uploadCard.style.borderColor = '';
        });
        
        uploadCard.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadCard.style.borderColor = '';
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('请上传图片文件', 'error');
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                showToast('图片大小不能超过 10MB', 'error');
                return;
            }
            
            selectedFile = file;
            
            // Show file info
            const reader = new FileReader();
            reader.onload = (e) => {
                fileThumb.src = e.target.result;
                fileName.textContent = file.name;
                fileInfo.classList.add('show');
                uploadCard.classList.add('has-file');
            };
            reader.readAsDataURL(file);
            
            processBtn.disabled = false;
            processBtn.textContent = '开始处理';
        }
        
        // Remove file
        fileRemove.addEventListener('click', (e) => {
            e.stopPropagation();
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
            uploadCard.classList.remove('has-file');
            processBtn.disabled = true;
        });
        
        // Process
        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            uploadCard.style.display = 'none';
            loading.classList.add('show');
            
            try {
                const formData = new FormData();
                formData.append('image_file', selectedFile);
                formData.append('size', 'auto');
                formData.append('format', 'png');
                
                // Using a free trial API - replace with your own key
                const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: {
                        'X-Api-Key': 'e1c7d8d6f5c4a3b2e1d0c9a8b7c6d5e4' // Replace with valid key
                    },
                    body: formData
                });
                
                if (!response.ok) throw new Error('处理失败');
                
                const blob = await response.blob();
                resultUrl = URL.createObjectURL(blob);
                resultImg.src = resultUrl;
                
                loading.classList.remove('show');
                result.classList.add('show');
                showToast('处理完成！', 'success');
            } catch (err) {
                console.error(err);
                loading.classList.remove('show');
                uploadCard.style.display = '';
                showToast('处理失败，请重试', 'error');
            }
        });
        
        // Download
        function download() {
            if (resultUrl) {
                const a = document.createElement('a');
                a.href = resultUrl;
                a.download = '抠图-' + Date.now() + '.png';
                a.click();
                showToast('开始下载！', 'success');
            }
        }
        
        // Reset
        function reset() {
            result.classList.remove('show');
            uploadCard.style.display = '';
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
            uploadCard.classList.remove('has-file');
            processBtn.disabled = true;
            if (resultUrl) {
                URL.revokeObjectURL(resultUrl);
                resultUrl = '';
            }
        }
        
        // Toast
        function showToast(msg, type = '') {
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
